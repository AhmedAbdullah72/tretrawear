    <!-- Inline critical CSS for faster FCP -->
    <style>
      :root{--background:0 0% 98%;--foreground:0 0% 8%;--primary:355 100% 33%;--primary-foreground:0 0% 100%}
      *{margin:0;padding:0;box-sizing:border-box}
      body{background-color:hsl(0 0% 98%);color:hsl(0 0% 8%);font-family:Inter,system-ui,sans-serif;-webkit-font-smoothing:antialiased}
      #root{min-height:100vh}
      .min-h-screen{min-height:100vh}

      .bg-foreground{background-color:hsl(0 0% 8%)}
      .shell-nav{position:sticky;top:0;z-index:50;width:100%;background:hsl(0 0% 98%);border-bottom:1px solid hsl(0 0% 90%);padding:12px 24px;display:flex;align-items:center;justify-content:space-between;height:60px}

      .shell-hero-text{color:hsl(0 0% 100%);font-family:Anton,system-ui,sans-serif;font-size:clamp(2rem,6vw,4rem);text-align:center;opacity:.15}
